spring:
  application:
    name: rapid-food-api

  datasource:
    url: jdbc:postgresql://localhost:5432/rapid_food_db?createDatabaseIfNotExist=true
    url: jdbc:postgresql://postgres:5432/rapid_food_db
    password: postgre
    username: postgre
    password: postgre
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9094

    consumer:
      group-id: rapid-food-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "*"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    hibernate:
      ddl-auto: validate 
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  output:
    ansi:
      enabled: ALWAYS

server:
  port: 8080

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss}){cyan} | %clr(%-5level){highlight} | %clr(${spring.application.name}){magenta} | %clr(%logger{20}){yellow} | %msg%n"
  level:
    org.springframework: INFO
    org.hibernate: ERROR
